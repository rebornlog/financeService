<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金分析平台 - 专业版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.95);
            color: #333;
        }
        .card-dark {
            background: rgba(30,30,50,0.9);
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 30px;
        }
        .nav-tabs .nav-link {
            color: #666;
            font-weight: 500;
            border: none;
        }
        .nav-tabs .nav-link.active {
            color: #667eea;
            background: transparent;
            border: none;
            border-bottom: 3px solid #667eea;
        }
        .indicator-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .signal-buy { color: #28a745; }
        .signal-sell { color: #dc3545; }
        .signal-hold { color: #ffc107; }
        .gain-positive { color: #28a745; }
        .gain-negative { color: #dc3545; }
        .ws-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .ws-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .ws-connected { background: #28a745; }
        .ws-disconnected { background: #dc3545; }
        
        /* Loading动画 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 5px;
        }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Toast提示 */
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; margin-bottom: 10px; padding: 15px 20px; border-radius: 8px; color: #fff; animation: slideIn 0.3s ease; }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        .toast-info { background: #17a2b8; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        /* 热门基金标签 */
        .hot-tag { background: linear-gradient(135deg, #ff6b6b, #ffa500); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 5px; }
        
        /* 搜索自动补全 */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 1000;
            background: white; border-radius: 0 0 10px 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 250px; overflow-y: auto; display: none;
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; color: #333;
        }
        .autocomplete-item:hover { background: #f8f9fa; }
        .autocomplete-item .code { color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- WebSocket状态 -->
    <div class="ws-status">
        <span id="wsStatus" class="badge bg-secondary">
            <span class="ws-indicator ws-disconnected"></span>
            未连接
        </span>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-12">
                <div class="card p-4 mb-4">
                    <h2 class="text-center mb-4">
                        <i class="bi bi-graph-up-arrow"></i> 基金分析平台 <span class="badge bg-primary">Pro</span>
                    </h2>
                    
                    <!-- 标签页导航 -->
                    <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="analyze-tab" data-bs-toggle="tab" data-bs-target="#analyze" type="button">基金分析</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="portfolio-tab" data-bs-toggle="tab" data-bs-target="#portfolio" type="button">组合管理</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="backtest-tab" data-bs-toggle="tab" data-bs-target="#backtest" type="button">收益回测</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="compare-tab" data-bs-toggle="tab" data-bs-target="#compare" type="button">基金对比</button>
                        </li>
                    </ul>
                    
                    <!-- 标签页内容 -->
                    <div class="tab-content" id="myTabContent">
                        <!-- 基金分析 -->
                        <div class="tab-pane fade show active" id="analyze">
                            <div class="row g-3 mt-2">
                                <div class="col-md-8 autocomplete-wrapper">
                                    <input type="text" id="fundCode" class="form-control" placeholder="输入基金代码或名称搜索" value="161039" autocomplete="off">
                                    <div class="autocomplete-list" id="autocompleteList"></div>
                                </div>
                                <div class="col-md-4">
                                    <button class="btn btn-primary w-100" onclick="analyzeFund()">
                                        <i class="bi bi-search"></i> 分析
                                    </button>
                                </div>
                            </div>
                            <!-- 热门基金推荐 -->
                            <div class="mt-3">
                                <span class="text-muted"><i class="bi bi-fire"></i> 热门基金: </span>
                                <div class="d-inline-flex flex-wrap gap-2 mt-2">
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('161039')">易方达消费 <span class="hot-tag">消费</span></button>
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('161725')">招商白酒 <span class="hot-tag">白酒</span></button>
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('005827')">易方达蓝筹 <span class="hot-tag">大盘</span></button>
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('110011')">易方达中小盘 <span class="hot-tag">中小盘</span></button>
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('000311')">景顺长城沪深300 <span class="hot-tag">指数</span></button>
                                    <button class="btn btn-sm btn-outline-primary" onclick="setFund('160706')">嘉实沪深300ETF <span class="hot-tag">ETF</span></button>
                                </div>
                            </div>
                            
                            <div id="analyzeResult" class="mt-4"></div>
                        </div>
                        
                        <!-- 组合管理 -->
                        <div class="tab-pane fade" id="portfolio">
                            <div class="row g-3 mt-2">
                                <div class="col-md-4">
                                    <input type="text" id="portfolioName" class="form-control" placeholder="组合名称" value="我的组合">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary" onclick="createPortfolio()">
                                        <i class="bi bi-plus"></i> 创建组合
                                    </button>
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-outline-secondary" onclick="loadPortfolios()">
                                        <i class="bi bi-arrow-clockwise"></i> 刷新
                                    </button>
                                </div>
                            </div>
                            
                            <div id="portfolioList" class="mt-4"></div>
                            
                            <!-- 添加基金表单 -->
                            <div class="card mt-3 p-3">
                                <h6>添加基金到组合</h6>
                                <div class="row g-2">
                                    <div class="col-md-3">
                                        <input type="text" id="addFundCode" class="form-control" placeholder="基金代码">
                                    </div>
                                    <div class="col-md-3">
                                        <input type="number" id="addShares" class="form-control" placeholder="持有份额">
                                    </div>
                                    <div class="col-md-3">
                                        <input type="number" id="addCost" class="form-control" placeholder="投入金额">
                                    </div>
                                    <div class="col-md-3">
                                        <button class="btn btn-primary w-100" onclick="addToPortfolio()">
                                            <i class="bi bi-plus"></i> 添加
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 收益回测 -->
                        <div class="tab-pane fade" id="backtest">
                            <div class="row g-3 mt-2">
                                <div class="col-md-3">
                                    <input type="text" id="btFundCode" class="form-control" placeholder="基金代码" value="161039">
                                </div>
                                <div class="col-md-3">
                                    <input type="date" id="btStartDate" class="form-control" value="2025-01-01">
                                </div>
                                <div class="col-md-3">
                                    <input type="date" id="btEndDate" class="form-control" value="2025-12-31">
                                </div>
                                <div class="col-md-3">
                                    <input type="number" id="btMoney" class="form-control" placeholder="初始资金" value="100000">
                                </div>
                            </div>
                            <div class="mt-3">
                                <button class="btn btn-primary" onclick="runBacktest()">
                                    <i class="bi bi-play"></i> 开始回测
                                </button>
                            </div>
                            
                            <div id="backtestResult" class="mt-4"></div>
                        </div>
                        
                        <!-- 基金对比 -->
                        <div class="tab-pane fade" id="compare">
                            <div class="row g-3 mt-2">
                                <div class="col-md-12">
                                    <div class="card p-3">
                                        <h6><i class="bi bi-bar-chart-steps"></i> 选择要对比的基金 (最多3只)</h6>
                                        <div class="row g-2 mt-2">
                                            <div class="col-md-4">
                                                <input type="text" id="compareFund1" class="form-control" placeholder="基金1代码" value="161039">
                                            </div>
                                            <div class="col-md-4">
                                                <input type="text" id="compareFund2" class="form-control" placeholder="基金2代码" value="161725">
                                            </div>
                                            <div class="col-md-4">
                                                <input type="text" id="compareFund3" class="form-control" placeholder="基金3代码" value="005827">
                                            </div>
                                        </div>
                                        <button class="btn btn-primary mt-3" onclick="compareFunds()">
                                            <i class="bi bi-clipboard-data"></i> 开始对比
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div id="compareResult" class="mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_BASE = 'http://localhost:9000';
        let currentPortfolioId = null;
        let ws = null;
        
        // Toast提示
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 显示加载状态
        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = `
                <div class="text-center py-4">
                    <div class="loading-spinner mx-auto mb-3"></div>
                    <p class="text-muted">加载中...</p>
                </div>`;
        }
        
        // 骨架屏
        function showSkeleton(elementId, lines = 3) {
            let html = '';
            for(let i = 0; i < lines; i++) {
                html += `<div class="skeleton mb-2" style="height: ${20 + Math.random() * 20}px; width: ${60 + Math.random() * 40}%"></div>`;
            }
            document.getElementById(elementId).innerHTML = html;
        }
        
        // 基金搜索自动补全
        const fundList = [
            {code: '161039', name: '易方达消费行业股票'},
            {code: '161725', name: '招商中证白酒指数'},
            {code: '005827', name: '易方达蓝筹精选混合'},
            {code: '110011', name: '易方达中小盘混合'},
            {code: '000311', name: '景顺长城沪深300指数'},
            {code: '160706', name: '嘉实沪深300ETF'},
            {code: '001552', name: '天弘中证银行指数'},
            {code: '001878', name: '嘉实沪港深精选股票'},
            {code: '001865', name: '建信创新中国混合'},
            {code: '000962', name: '景顺长城新兴成长混合'}
        ];
        
        document.getElementById('fundCode').addEventListener('input', function(e) {
            const val = e.target.value.trim().toLowerCase();
            const list = document.getElementById('autocompleteList');
            if (val.length < 1) { list.classList.remove('show'); return; }
            
            const matches = fundList.filter(f => f.code.toLowerCase().includes(val) || f.name.toLowerCase().includes(val));
            if (matches.length === 0) { list.classList.remove('show'); return; }
            
            list.innerHTML = matches.map(f => `<div class="autocomplete-item" onclick="selectFund('${f.code}')"><strong>${f.code}</strong> <span class="code">${f.name}</span></div>`).join('');
            list.classList.add('show');
        });
        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.autocomplete-wrapper')) {
                document.getElementById('autocompleteList').classList.remove('show');
            }
        });
        
        function selectFund(code) {
            document.getElementById('fundCode').value = code;
            document.getElementById('autocompleteList').classList.remove('show');
            analyzeFund();
        }
        
        // 绘制净值走势图
        async function drawNavChart(fundCode) {
            try {
                const res = await fetch(`${API_BASE}/fund/history/${fundCode}?days=90`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const ctx = document.getElementById('navChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.dates || [],
                        datasets: [{
                            label: '单位净值',
                            data: data.values || [],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: true, grid: { display: false } },
                            y: { grid: { color: '#eee' } }
                        }
                    }
                });
            } catch(e) {
                // 静默失败，不影响其他功能
            }
        }
        
        // WebSocket连接
        function connectWS() {
            const wsUrl = API_BASE.replace('http', 'ws') + '/ws';
            ws = new WebSocket(`${wsUrl}?client_id=web_${Date.now()}`);
            
            ws.onopen = function() {
                document.getElementById('wsStatus').innerHTML = 
                    '<span class="ws-indicator ws-connected"></span>已连接';
                document.getElementById('wsStatus').className = 'badge bg-success';
                
                // 订阅基金
                ws.send(JSON.stringify({action: 'subscribe', funds: ['161039', '161725']}));
            };
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log('WS消息:', data);
                
                if (data.type === 'price_update') {
                    // 更新价格显示
                    showPriceUpdate(data);
                }
            };
            
            ws.onclose = function() {
                document.getElementById('wsStatus').innerHTML = 
                    '<span class="ws-indicator ws-disconnected"></span>未连接';
                document.getElementById('wsStatus').className = 'badge bg-secondary';
                
                // 尝试重连
                setTimeout(connectWS, 5000);
            };
            
            ws.onerror = function(err) {
                console.error('WS错误:', err);
            };
        }
        
        function showPriceUpdate(data) {
            // 可以在这里添加实时价格动画
            console.log(`${data.fund_code} 更新: ${data.price}`);
        }
        
        // 初始化WebSocket
        connectWS();
        
        function setFund(code) {
            document.getElementById('fundCode').value = code;
            analyzeFund();
        }
        
        async function analyzeFund() {
            const fundCode = document.getElementById('fundCode').value.trim();
            if (!fundCode) return showToast('请输入基金代码', 'error');
            
            showSkeleton('analyzeResult', 5);
            
            try {
                const res = await fetch(`${API_BASE}/fund/analyze/${fundCode}`);
                if (!res.ok) throw new Error('基金不存在');
                const data = await res.json();
                
                let html = `
                    <div class="card p-3 mb-3">
                        <div class="row">
                            <div class="col-md-6">
                                <h5>${data.fund_name}</h5>
                                <p class="mb-1">净值: <strong>${data.net_value?.toFixed(4)}</strong></p>
                                <p class="mb-0">日涨幅: <span class="${data.growth_rate >= 0 ? 'gain-positive' : 'gain-negative'}">
                                    ${data.growth_rate >= 0 ? '+' : ''}${data.growth_rate?.toFixed(2)}%
                                </span></p>
                            </div>
                            <div class="col-md-6 text-end">
                                <h4 class="${data.overall_signal === 'BUY' ? 'signal-buy' : data.overall_signal === 'SELL' ? 'signal-sell' : 'signal-hold'}">
                                    ${data.overall_signal}
                                </h4>
                                <p class="text-muted">${data.recommendation}</p>
                                <p>风险: ${data.risk_level}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                `;
                
                data.indicators.forEach(ind => {
                    let signalClass = ind.signal === 'BUY' ? 'signal-buy' : ind.signal === 'SELL' ? 'signal-sell' : 'signal-hold';
                    html += `
                        <div class="col-md-4">
                            <div class="indicator-card">
                                <h6>${ind.name}</h6>
                                <p class="mb-1">数值: <strong>${ind.value?.toFixed(2)}</strong></p>
                                <p class="mb-0 ${signalClass}">${ind.signal} (${(ind.confidence*100).toFixed(0)}%)</p>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                
                // 添加净值走势图
                html += `
                    <div class="card mt-3 p-3">
                        <h6><i class="bi bi-graph-up"></i> 净值走势 (近90天)</h6>
                        <canvas id="navChart" height="100"></canvas>
                    </div>
                `;
                
                document.getElementById('analyzeResult').innerHTML = html;
                
                // 绘制图表
                drawNavChart(fundCode);
                
            } catch(e) {
                showToast('加载失败: ' + e.message, 'error');
                document.getElementById('analyzeResult').innerHTML = '<p class="text-danger text-center">加载失败，请检查基金代码是否正确</p>';
            }
        }
        
        // 组合管理
        async function createPortfolio() {
            const name = document.getElementById('portfolioName').value;
            if (!name) return showToast('请输入组合名称', 'error');
            
            try {
                const res = await fetch(`${API_BASE}/portfolio/user1?name=${encodeURIComponent(name)}`, {method: 'POST'});
                const data = await res.json();
                showToast('创建成功!', 'success');
                loadPortfolios();
            } catch(e) {
                showToast('创建失败: ' + e.message, 'error');
            }
        }
        
        async function loadPortfolios() {
            try {
                const res = await fetch(`${API_BASE}/portfolio/user1`);
                const data = await res.json();
                
                if (data.portfolios.length === 0) {
                    document.getElementById('portfolioList').innerHTML = '<p class="text-muted">暂无组合</p>';
                    return;
                }
                
                let html = '<div class="row">';
                data.portfolios.forEach(p => {
                    const gainClass = p.total_gain >= 0 ? 'gain-positive' : 'gain-negative';
                    html += `
                        <div class="col-md-6">
                            <div class="card p-3 mb-2">
                                <h6>${p.name}</h6>
                                <p class="mb-1">总价值: <strong>${p.total_value?.toFixed(2)}</strong></p>
                                <p class="mb-1">总收益: <span class="${gainClass}">${p.total_gain?.toFixed(2)} (${p.total_gain_pct?.toFixed(2)}%)</span></p>
                                <p class="mb-0 text-muted">持仓: ${p.holdings?.length || 0}只</p>
                            </div>
                        </div>
                    `;
                    if (p.holdings?.length > 0) currentPortfolioId = p.id;
                });
                html += '</div>';
                document.getElementById('portfolioList').innerHTML = html;
                
            } catch(e) {
                console.error(e);
            }
        }
        
        async function addToPortfolio() {
            const fundCode = document.getElementById('addFundCode').value;
            const shares = parseFloat(document.getElementById('addShares').value);
            const cost = parseFloat(document.getElementById('addCost').value);
            
            if (!currentPortfolioId) return showToast('请先创建组合', 'error');
            if (!fundCode || !shares || !cost) return showToast('请填写完整', 'error');
            
            try {
                const res = await fetch(
                    `${API_BASE}/portfolio/user1/${currentPortfolioId}/add?fund_code=${fundCode}&shares=${shares}&cost=${cost}`,
                    {method: 'POST'}
                );
                const data = await res.json();
                showToast('添加成功!', 'success');
                loadPortfolios();
            } catch(e) {
                showToast('添加失败: ' + e.message, 'error');
            }
        }
        
        // 回测
        async function runBacktest() {
            const fundCode = document.getElementById('btFundCode').value;
            const startDate = document.getElementById('btStartDate').value;
            const endDate = document.getElementById('btEndDate').value;
            const money = document.getElementById('btMoney').value;
            
            try {
                const res = await fetch(
                    `${API_BASE}/backtest?fund_code=${fundCode}&start_date=${startDate}&end_date=${endDate}&initial_money=${money}`
                );
                const data = await res.json();
                
                const gainClass = data.results.return_pct >= 0 ? 'gain-positive' : 'gain-negative';
                
                document.getElementById('backtestResult').innerHTML = `
                    <div class="card p-3">
                        <h5>回测结果: ${data.fund_code}</h5>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <p>初始资金: <strong>¥${data.results.initial_money?.toLocaleString()}</strong></p>
                                <p>最终价值: <strong>¥${data.results.final_value?.toLocaleString()}</strong></p>
                                <p class="${gainClass}">总收益: <strong>¥${data.results.total_return?.toLocaleString()} (${data.results.return_pct}%)</strong></p>
                            </div>
                            <div class="col-md-6">
                                <p>年化收益: <strong>${data.results.annual_return}%</strong></p>
                                <p>最大回撤: <strong>${data.results.max_drawdown}%</strong></p>
                                <p>胜率: <strong>${data.win_rate}%</strong></p>
                            </div>
                        </div>
                    </div>
                `;
                
            } catch(e) {
                showToast('回测失败: ' + e.message, 'error');
            }
        }
        
        // 基金对比
        async function compareFunds() {
            const funds = [
                document.getElementById('compareFund1').value.trim(),
                document.getElementById('compareFund2').value.trim(),
                document.getElementById('compareFund3').value.trim()
            ].filter(f => f);
            
            if (funds.length < 2) return showToast('请至少输入2个基金代码', 'error');
            
            showSkeleton('compareResult', 4);
            
            try {
                const res = await fetch(`${API_BASE}/fund/compare`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(funds)
                });
                if (!res.ok) throw new Error('对比失败');
                const data = await res.json();
                
                let html = `
                    <div class="card p-3">
                        <h5><i class="bi bi-bar-chart"></i> 对比结果</h5>
                        <div class="table-responsive mt-3">
                            <table class="table table-bordered text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th>指标</th>
                                        ${data.funds.map(f => `<th>${f.name}<br><small>${f.code}</small></th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><strong>基金类型</strong></td>
                                        ${data.funds.map(f => `<td>${f.type}</td>`).join('')}
                                    </tr>
                                    <tr>
                                        <td><strong>单位净值</strong></td>
                                        ${data.funds.map(f => `<td>${f.nav?.toFixed(4)}</td>`).join('')}
                                    </tr>
                                    <tr>
                                        <td><strong>日涨幅</strong></td>
                                        ${data.funds.map(f => `<td class="${f.growth >= 0 ? 'gain-positive' : 'gain-negative'}">${f.growth >= 0 ? '+' : ''}${f.growth?.toFixed(2)}%</td>`).join('')}
                                    </tr>
                                    <tr>
                                        <td><strong>近1月</strong></td>
                                        ${data.funds.map(f => `<td class="${f.growth1m >= 0 ? 'gain-positive' : 'gain-negative'}">${f.growth1m >= 0 ? '+' : ''}${f.growth1m?.toFixed(2)}%</td>`).join('')}
                                    </tr>
                                    <tr>
                                        <td><strong>近3月</strong></td>
                                        ${data.funds.map(f => `<td class="${f.growth3m >= 0 ? 'gain-positive' : 'gain-negative'}">${f.growth3m >= 0 ? '+' : ''}${f.growth3m?.toFixed(2)}%</td>`).join('')}
                                    </tr>
                                    <tr>
                                        <td><strong>近1年</strong></td>
                                        ${data.funds.map(f => `<td class="${f.growth1y >= 0 ? 'gain-positive' : 'gain-negative'}">${f.growth1y >= 0 ? '+' : ''}${f.growth1y?.toFixed(2)}%</td>`).join('')}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-3">
                            <canvas id="compareChart" height="80"></canvas>
                        </div>
                    </div>
                `;
                
                document.getElementById('compareResult').innerHTML = html;
                
                // 绘制对比图表
                const ctx = document.getElementById('compareChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['近1月', '近3月', '近1年'],
                        datasets: data.funds.map((f, i) => ({
                            label: f.name,
                            data: [f.growth1m || 0, f.growth3m || 0, f.growth1y || 0],
                            backgroundColor: ['#667eea', '#764ba2', '#f093fb'][i]
                        }))
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'top' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
                
                showToast('对比完成!', 'success');
            } catch(e) {
                showToast('对比失败: ' + e.message, 'error');
            }
        }
        
        // 页面加载时
        window.onload = function() {
            analyzeFund();
            loadPortfolios();
        };
    </script>
</body>
</html>
